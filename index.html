<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>坦克大战</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a12;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    #gameContainer {
      position: relative;
    }
    canvas {
      display: block;
      border: 3px solid #333;
      border-radius: 4px;
      box-shadow: 0 0 40px rgba(0, 200, 100, 0.2);
    }
    #overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(10, 10, 18, 0.92);
      color: #fff;
      text-align: center;
    }
    #overlay.hidden { display: none; }
    #overlay h1 {
      font-size: 48px;
      color: #4ade80;
      text-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
      margin-bottom: 12px;
    }
    #overlay .subtitle {
      font-size: 18px;
      color: #888;
      margin-bottom: 32px;
    }
    #overlay .instructions {
      font-size: 14px;
      color: #666;
      line-height: 2;
      margin-bottom: 32px;
    }
    #overlay .key {
      display: inline-block;
      background: #222;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 2px 8px;
      font-family: monospace;
      color: #aaa;
    }
    #overlay .btn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border: none;
      color: white;
      font-size: 20px;
      padding: 14px 48px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4);
    }
    #overlay .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 30px rgba(34, 197, 94, 0.6);
    }
    #overlay .score-display {
      font-size: 28px;
      color: #fbbf24;
      margin-bottom: 16px;
    }
    #overlay .game-over-title {
      font-size: 52px;
      color: #ef4444;
      text-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
      margin-bottom: 12px;
    }
    #overlay .stats {
      font-size: 16px;
      color: #aaa;
      margin-bottom: 28px;
      line-height: 1.8;
    }
    .powered-by {
      position: absolute;
      bottom: 12px;
      right: 16px;
      font-size: 11px;
      color: #333;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="game"></canvas>
    <div id="overlay">
      <h1>🎮 坦克大战</h1>
      <p class="subtitle">Battle City · HTML5</p>
      <div class="instructions">
        <span class="key">W</span> <span class="key">A</span> <span class="key">S</span> <span class="key">D</span> 移动坦克<br>
        <span class="key">空格</span> 发射炮弹
      </div>
      <button class="btn" id="startBtn">开始游戏</button>
    </div>
    <div class="powered-by">Powered by Pretext</div>
  </div>

  <!-- Pretext via CDN (the library we're demonstrating) -->
  <script src="https://cdn.jsdelivr.net/npm/@chenglou/pretext@0.0.3/dist/layout.js"></script>

  <script>
  // ================================================================
  // 坦克大战 - Tank Battle Game
  // Demonstrating @chenglou/pretext for text measurement & layout
  // ================================================================

  const { prepare, prepareWithSegments, layout, layoutWithLines } = window.Pretext;

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');

  // Game dimensions
  const W = 640;
  const H = 640;
  canvas.width = W;
  canvas.height = H;

  // ================================================================
  // PRETEXT DEMONSTRATION #1: Menu Text Layout
  // Before drawing any text, we measure it with Pretext
  // to center things perfectly without DOM access!
  // ================================================================
  function drawTextWithPretext(text, x, y, fontSize, color, align = 'left') {
    const font = `${fontSize}px "Segoe UI", sans-serif`;
    // Use Pretext to prepare the text measurement
    const prepared = prepare(text, font);
    // Layout it - this is pure arithmetic, no DOM!
    const { width } = layout(prepared, Infinity, fontSize * 1.2);

    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textBaseline = 'top';

    let drawX = x;
    if (align === 'center') drawX = x - width / 2;
    else if (align === 'right') drawX = x - width;

    ctx.fillText(text, drawX, y);
    return width;
  }

  // ================================================================
  // PRETEXT DEMONSTRATION #2: Dynamic HUD Text
  // Calculate exact pixel width of HUD elements before drawing
  // to position them precisely
  // ================================================================
  function measureHUDText(text, fontSize) {
    const font = `${fontSize}px "Segoe UI", sans-serif`;
    const prepared = prepare(text, font);
    return layout(prepared, Infinity, fontSize * 1.2);
  }

  // Game state
  let gameState = 'menu'; // menu, playing, gameover
  let score = 0;
  let lives = 3;
  let wave = 1;
  let enemiesRemaining = 0;
  let gameTime = 0;

  // Colors
  const COLORS = {
    player: '#22c55e',
    enemy: '#ef4444',
    bullet: '#fbbf24',
    wall: '#6b7280',
    brick: '#d97706',
    water: '#3b82f6',
    tree: '#22c55e',
    explosion: ['#fbbf24', '#f97316', '#ef4444', '#dc2626'],
  };

  // Audio context for sound effects
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const now = audioCtx.currentTime;
    if (type === 'shoot') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      osc.start(now);
      osc.stop(now + 0.1);
    } else if (type === 'explosion') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(100, now);
      osc.frequency.exponentialRampToValueAtTime(20, now + 0.3);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.start(now);
      osc.stop(now + 0.3);
    } else if (type === 'hit') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.exponentialRampToValueAtTime(200, now + 0.15);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
      osc.start(now);
      osc.stop(now + 0.15);
    } else if (type === 'powerup') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.setValueAtTime(600, now + 0.1);
      osc.frequency.setValueAtTime(800, now + 0.2);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.start(now);
      osc.stop(now + 0.3);
    }
  }

  // ================================================================
  // PRETEXT DEMONSTRATION #3: Multi-line Text with Line Breaking
  // Use prepareWithSegments + layoutWithLines for wrapped text
  // ================================================================
  function drawWrappedText(text, x, y, maxWidth, fontSize, lineHeight, color) {
    const font = `${fontSize}px "Segoe UI", sans-serif`;
    const prepared = prepareWithSegments(text, font);
    const { lines } = layoutWithLines(prepared, maxWidth, lineHeight);

    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textBaseline = 'top';

    lines.forEach((line, i) => {
      ctx.fillText(line.text, x, y + i * lineHeight);
    });
  }

  // Tank class
  class Tank {
    constructor(x, y, isPlayer = false) {
      this.x = x;
      this.y = y;
      this.isPlayer = isPlayer;
      this.size = 32;
      this.dir = isPlayer ? 0 : 2; // 0=up, 1=right, 2=down, 3=left
      this.speed = isPlayer ? 3 : (1.5 + Math.random());
      this.fireRate = isPlayer ? 200 : 1500 + Math.random() * 1000;
      this.lastFire = 0;
      this.color = isPlayer ? COLORS.player : COLORS.enemy;
      this.trail = [];
      this.invincible = 0;
    }

    update(map, enemies) {
      if (this.invincible > 0) this.invincible--;

      // Move
      const nextX = this.x + this.getDX();
      const nextY = this.y + this.getDY();

      if (this.canMove(nextX, nextY, map)) {
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > 3) this.trail.shift();
        this.x = nextX;
        this.y = nextY;
      }

      // Keep in bounds
      this.x = Math.max(0, Math.min(W - this.size, this.x));
      this.y = Math.max(0, Math.min(H - this.size, this.y));

      // AI: move toward player or random direction
      if (!this.isPlayer && Math.random() < 0.02) {
        this.dir = Math.floor(Math.random() * 4);
      }
    }

    getDX() {
      if (this.dir === 1) return this.speed;
      if (this.dir === 3) return -this.speed;
      return 0;
    }

    getDY() {
      if (this.dir === 0) return -this.speed;
      if (this.dir === 2) return this.speed;
      return 0;
    }

    canMove(x, y, map) {
      const tileSize = 32;
      const corners = [
        [x, y],
        [x + this.size - 1, y],
        [x, y + this.size - 1],
        [x + this.size - 1, y + this.size - 1],
      ];

      for (const [cx, cy] of corners) {
        const tx = Math.floor(cx / tileSize);
        const ty = Math.floor(cy / tileSize);
        if (tx < 0 || ty < 0 || tx >= 20 || ty >= 20) return false;
        const tile = map[ty]?.[tx];
        if (tile === 1 || tile === 2) return false; // wall or brick
      }
      return true;
    }

    draw(ctx) {
      ctx.save();
      ctx.translate(this.x + this.size / 2, this.y + this.size / 2);
      ctx.rotate((this.dir * Math.PI) / 2);

      // Flicker when invincible
      if (this.invincible > 0 && Math.floor(this.invincible / 4) % 2) {
        ctx.restore();
        return;
      }

      // Tank body
      ctx.fillStyle = this.color;
      ctx.fillRect(-14, -14, 28, 28);

      // Darker center
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(-10, -10, 20, 20);

      // Turret
      ctx.fillStyle = this.isPlayer ? '#16a34a' : '#dc2626';
      ctx.fillRect(-4, -14, 8, 20);

      // Cannon
      ctx.fillStyle = this.isPlayer ? '#15803d' : '#b91c1c';
      ctx.fillRect(-3, -20, 6, 8);

      ctx.restore();
    }

    getCenter() {
      return { x: this.x + this.size / 2, y: this.y + this.size / 2 };
    }

    collidesWith(other) {
      return (
        this.x < other.x + other.size &&
        this.x + this.size > other.x &&
        this.y < other.y + other.size &&
        this.y + this.size > other.y
      );
    }
  }

  // Bullet class
  class Bullet {
    constructor(x, y, dir, isPlayer = true) {
      this.x = x;
      this.y = y;
      this.dir = dir;
      this.isPlayer = isPlayer;
      this.speed = 8;
      this.size = 6;
      this.active = true;
    }

    update() {
      const dx = [0, this.speed, 0, -this.speed][this.dir];
      const dy = [-this.speed, 0, this.speed, 0][this.dir];
      this.x += dx;
      this.y += dy;

      // Out of bounds
      if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) {
        this.active = false;
      }
    }

    draw(ctx) {
      ctx.fillStyle = COLORS.bullet;
      ctx.shadowColor = COLORS.bullet;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    getCenter() {
      return { x: this.x, y: this.y };
    }
  }

  // Explosion class
  class Explosion {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      this.frame = 0;
      this.maxFrames = 20;
      this.active = true;
    }

    update() {
      this.frame++;
      if (this.frame >= this.maxFrames) this.active = false;
    }

    draw(ctx) {
      const progress = this.frame / this.maxFrames;
      const radius = 10 + progress * 25;
      const colorIndex = Math.floor(progress * this.explosion.length);

      ctx.fillStyle = COLORS.explosion[Math.min(colorIndex, 3)];
      ctx.globalAlpha = 1 - progress;
      ctx.beginPath();
      ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // ================================================================
  // PRETEXT DEMONSTRATION #4: Scoreboard with precise positioning
  // We use Pretext to measure each score element's width
  // so we can right-align numbers perfectly
  // ================================================================
  function drawHUD(ctx, score, lives, wave, enemiesRemaining) {
    const hudY = 10;
    const fontSize = 16;
    const padding = 12;

    // HUD background
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(0, 0, W, 44);

    // Score label + value (right-aligned numbers)
    const scoreLabel = '分数';
    const scoreText = `${score}`;

    // Measure label
    const labelPrepared = prepare(scoreLabel, `${fontSize}px "Segoe UI", sans-serif`);
    const labelWidth = layout(labelPrepared, Infinity, fontSize * 1.2).width;

    // Measure score number
    const scorePrepared = prepare(scoreText, `bold ${fontSize}px "Segoe UI", sans-serif`);
    const scoreWidth = layout(scorePrepared, Infinity, fontSize * 1.2).width;

    ctx.font = `${fontSize}px "Segoe UI", sans-serif`;
    ctx.fillStyle = '#888';
    ctx.textBaseline = 'top';
    ctx.fillText(scoreLabel, W - padding - labelWidth - scoreWidth - 8, hudY);

    ctx.font = `bold ${fontSize}px "Segoe UI", sans-serif`;
    ctx.fillStyle = '#fbbf24';
    ctx.fillText(scoreText, W - padding - scoreWidth, hudY);

    // Lives with tank icons
    ctx.font = `${fontSize}px "Segoe UI", sans-serif`;
    ctx.fillStyle = '#888';
    const livesText = '生命';
    const livesPrepared = prepare(livesText, `${fontSize}px "Segoe UI", sans-serif`);
    const livesWidth = layout(livesPrepared, Infinity, fontSize * 1.2).width;
    ctx.fillText(livesText, W - padding - labelWidth - scoreWidth - 8 - livesWidth - 20, hudY);

    // Draw tank icons for lives
    for (let i = 0; i < lives; i++) {
      ctx.fillStyle = COLORS.player;
      ctx.fillRect(W - padding - (i + 1) * 18, hudY + 2, 14, 14);
    }

    // Wave info (left side)
    const waveText = `第 ${wave} 波`;
    const wavePrepared = prepare(waveText, `${fontSize}px "Segoe UI", sans-serif`);
    const waveWidth = layout(wavePrepared, Infinity, fontSize * 1.2).width;
    ctx.font = `${fontSize}px "Segoe UI", sans-serif`;
    ctx.fillStyle = '#4ade80';
    ctx.fillText(waveText, padding, hudY);

    // Enemy count
    const enemyText = `敌人: ${enemiesRemaining}`;
    const enemyPrepared = prepare(enemyText, `${fontSize}px "Segoe UI", sans-serif`);
    ctx.fillStyle = '#ef4444';
    ctx.fillText(enemyText, padding + waveWidth + 20, hudY);

    // ================================================================
    // PRETEXT DEMONSTRATION #5: Game timer (top center)
    // Pretext makes it easy to center text at any position
    // ================================================================
    const timeText = formatTime(gameTime);
    const timeFont = `${fontSize}px "Segoe UI", sans-serif`;
    const timePrepared = prepare(timeText, timeFont);
    const timeWidth = layout(timePrepared, Infinity, fontSize * 1.2).width;

    ctx.font = timeFont;
    ctx.fillStyle = '#60a5fa';
    ctx.textAlign = 'center';
    ctx.fillText(timeText, W / 2, hudY);
    ctx.textAlign = 'left';
  }

  function formatTime(frames) {
    const seconds = Math.floor(frames / 60);
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
  }

  // Map: 0=grass, 1=wall, 2=brick, 3=water, 4=tree
  function generateMap() {
    const map = Array(20).fill(null).map(() => Array(20).fill(0));

    // Border walls
    for (let i = 0; i < 20; i++) {
      map[0][i] = 1;
      map[19][i] = 1;
      map[i][0] = 1;
      map[i][19] = 1;
    }

    // Internal walls
    const patterns = [
      [3, 3], [3, 16], [16, 3], [16, 16],
      [3, 7], [3, 12], [7, 3], [12, 3],
      [16, 7], [16, 12], [7, 16], [12, 16],
      [10, 7], [9, 10], [10, 13],
    ];

    for (const [r, c] of patterns) {
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (Math.random() > 0.3) {
            const nr = r + dr;
            const nc = c + dc;
            if (nr > 0 && nr < 19 && nc > 0 && nc < 19) {
              map[nr][nc] = Math.random() > 0.5 ? 1 : 2;
            }
          }
        }
      }
    }

    // Water pools
    const waterSpots = [[5, 5], [14, 5], [5, 14], [14, 14]];
    for (const [r, c] of waterSpots) {
      for (let dr = 0; dr < 2; dr++) {
        for (let dc = 0; dc < 2; dc++) {
          if (Math.random() > 0.4) {
            map[r + dr][c + dc] = 3;
          }
        }
      }
    }

    return map;
  }

  function drawMap(ctx, map) {
    const tileSize = 32;

    for (let r = 0; r < 20; r++) {
      for (let c = 0; c < 20; c++) {
        const tile = map[r][c];
        const x = c * tileSize;
        const y = r * tileSize + 44; // Offset for HUD

        if (tile === 1) {
          // Wall - steel
          ctx.fillStyle = '#4b5563';
          ctx.fillRect(x, y, tileSize, tileSize);
          ctx.fillStyle = '#6b7280';
          ctx.fillRect(x + 2, y + 2, tileSize - 4, tileSize - 4);
        } else if (tile === 2) {
          // Brick
          ctx.fillStyle = '#d97706';
          ctx.fillRect(x, y, tileSize, tileSize);
          ctx.strokeStyle = '#92400e';
          ctx.lineWidth = 1;
          for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.moveTo(x, y + i * 11 + 5);
            ctx.lineTo(x + tileSize, y + i * 11 + 5);
            ctx.stroke();
          }
        } else if (tile === 3) {
          // Water
          ctx.fillStyle = '#1e40af';
          ctx.fillRect(x, y, tileSize, tileSize);
          ctx.fillStyle = '#3b82f6';
          const waveOffset = Math.sin(Date.now() / 200 + c + r) * 2;
          ctx.fillRect(x + 4 + waveOffset, y + 4, 8, 4);
          ctx.fillRect(x + 16 - waveOffset, y + 14, 10, 4);
          ctx.fillRect(x + 6 + waveOffset, y + 24, 8, 4);
        } else if (tile === 4) {
          // Tree
          ctx.fillStyle = '#14532d';
          ctx.fillRect(x + 12, y + 8, 8, 20);
          ctx.fillStyle = '#22c55e';
          ctx.beginPath();
          ctx.arc(x + 16, y + 12, 12, 0, Math.PI * 2);
          ctx.fill();
        } else {
          // Grass
          ctx.fillStyle = '#1a2e1a';
          ctx.fillRect(x, y, tileSize, tileSize);
          ctx.fillStyle = '#2d4a2d';
          ctx.fillRect(x + 4, y + 4, 4, 4);
          ctx.fillRect(x + 20, y + 12, 6, 6);
          ctx.fillRect(x + 8, y + 22, 5, 5);
        }
      }
    }
  }

  // Game objects
  let map = generateMap();
  let player = new Tank(W / 2 - 16, H - 64, true);
  let enemies = [];
  let bullets = [];
  let explosions = [];
  let keys = {};

  // Spawn wave of enemies
  function spawnWave(waveNum) {
    const count = Math.min(3 + waveNum, 8);
    enemiesRemaining = count;

    for (let i = 0; i < count; i++) {
      const spawnPoints = [
        [64, 64], [W / 2 - 16, 64], [W - 96, 64],
        [64, 160], [W - 96, 160],
      ];
      const [sx, sy] = spawnPoints[i % spawnPoints.length];
      const enemy = new Tank(sx, sy, false);
      enemy.speed = 1.5 + waveNum * 0.2 + Math.random();
      enemies.push(enemy);
    }
  }

  // Input handling
  document.addEventListener('keydown', (e) => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === ' ') e.preventDefault();
  });
  document.addEventListener('keyup', (e) => {
    keys[e.key.toLowerCase()] = false;
  });

  function handlePlayerInput() {
    if (keys['w'] || keys['arrowup']) { player.dir = 0; player.update(map, enemies); }
    if (keys['s'] || keys['arrowdown']) { player.dir = 2; player.update(map, enemies); }
    if (keys['a'] || keys['arrowleft']) { player.dir = 3; player.update(map, enemies); }
    if (keys['d'] || keys['arrowright']) { player.dir = 1; player.update(map, enemies); }

    if (keys[' ']) {
      const now = Date.now();
      if (now - player.lastFire > player.fireRate) {
        player.lastFire = now;
        const c = player.getCenter();
        const dx = [0, 8, 0, -8][player.dir];
        const dy = [-8, 0, 8, 0][player.dir];
        bullets.push(new Bullet(c.x + dx, c.y + dy, player.dir, true));
        playSound('shoot');
      }
    }
  }

  function updateEnemies() {
    for (const enemy of enemies) {
      enemy.update(map, [player, ...enemies.filter(e => e !== enemy)]);

      // AI shooting
      const now = Date.now();
      if (now - enemy.lastFire > enemy.fireRate) {
        enemy.lastFire = now;
        const c = enemy.getCenter();
        const dx = [0, 8, 0, -8][enemy.dir];
        const dy = [-8, 0, 8, 0][enemy.dir];
        bullets.push(new Bullet(c.x + dx, c.y + dy, enemy.dir, false));
      }
    }
  }

  function updateBullets() {
    for (const bullet of bullets) {
      if (!bullet.active) continue;
      bullet.update();

      // Check wall collision
      const tx = Math.floor(bullet.x / 32);
      const ty = Math.floor((bullet.y - 44) / 32);
      if (ty >= 0 && ty < 20 && tx >= 0 && tx < 20) {
        if (map[ty][tx] === 1 || map[ty][tx] === 2) {
          bullet.active = false;
          map[ty][tx] = Math.random() > 0.7 ? 0 : map[ty][tx];
          explosions.push(new Explosion(bullet.x, bullet.y));
          playSound('hit');
          continue;
        }
      }

      // Check tank collision
      if (bullet.isPlayer) {
        for (let i = enemies.length - 1; i >= 0; i--) {
          const enemy = enemies[i];
          const ec = enemy.getCenter();
          const dist = Math.hypot(bullet.x - ec.x, bullet.y - ec.y);
          if (dist < 16) {
            bullet.active = false;
            explosions.push(new Explosion(ec.x, ec.y));
            enemies.splice(i, 1);
            enemiesRemaining--;
            score += 100 + wave * 10;
            playSound('explosion');
            break;
          }
        }
      } else {
        const pc = player.getCenter();
        const dist = Math.hypot(bullet.x - pc.x, bullet.y - pc.y);
        if (dist < 16 && player.invincible === 0) {
          bullet.active = false;
          lives--;
          player.invincible = 120;
          explosions.push(new Explosion(pc.x, pc.y));
          playSound('hit');

          if (lives <= 0) {
            gameState = 'gameover';
            showOverlay('gameover');
          }
        }
      }

      // Enemy-enemy or enemy-player collision
      if (!bullet.isPlayer) {
        const pc = player.getCenter();
        const dist = Math.hypot(bullet.x - pc.x, bullet.y - pc.y);
        if (dist < 20 && player.invincible === 0) {
          bullet.active = false;
          lives--;
          player.invincible = 120;
          explosions.push(new Explosion(pc.x, pc.y));
          playSound('hit');
          if (lives <= 0) {
            gameState = 'gameover';
            showOverlay('gameover');
          }
        }
      }
    }

    bullets = bullets.filter(b => b.active);
  }

  function showOverlay(type) {
    overlay.classList.remove('hidden');

    if (type === 'menu') {
      overlay.innerHTML = `
        <h1>🎮 坦克大战</h1>
        <p class="subtitle">Battle City · HTML5</p>
        <div class="instructions">
          <span class="key">W</span> <span class="key">A</span> <span class="key">S</span> <span class="key">D</span> 移动坦克<br>
          <span class="key">空格</span> 发射炮弹
        </div>
        <button class="btn" id="startBtn">开始游戏</button>
        <p style="margin-top:20px;font-size:12px;color:#444;">文字渲染驱动 by @chenglou/pretext</p>
      `;
    } else if (type === 'gameover') {
      overlay.innerHTML = `
        <p class="game-over-title">💥 游戏结束</p>
        <p class="score-display">得分: ${score}</p>
        <div class="stats">
          存活时间: ${formatTime(gameTime)}<br>
          通关波数: ${wave - 1}<br>
          击毁坦克: ${Math.floor(score / 100)}
        </div>
        <button class="btn" id="restartBtn">再来一局</button>
      `;
    }

    document.getElementById(type === 'menu' ? 'startBtn' : 'restartBtn').addEventListener('click', startGame);
  }

  function startGame() {
    initAudio();
    gameState = 'playing';
    score = 0;
    lives = 3;
    wave = 1;
    gameTime = 0;
    map = generateMap();
    player = new Tank(W / 2 - 16, H - 64, true);
    enemies = [];
    bullets = [];
    explosions = [];
    overlay.classList.add('hidden');
    spawnWave(wave);
  }

  // Main game loop
  function gameLoop() {
    if (gameState !== 'playing') {
      requestAnimationFrame(gameLoop);
      return;
    }

    gameTime++;

    // Handle input
    handlePlayerInput();
    updateEnemies();
    updateBullets();

    // Update explosions
    for (const exp of explosions) exp.update();
    explosions = explosions.filter(e => e.active);

    // Check wave clear
    if (enemies.length === 0 && enemiesRemaining === 0) {
      wave++;
      score += wave * 200;
      spawnWave(wave);
    }

    // Draw
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, W, H);

    drawMap(ctx, map);

    for (const exp of explosions) exp.draw(ctx);
    for (const bullet of bullets) bullet.draw(ctx);
    for (const enemy of enemies) enemy.draw(ctx);
    player.draw(ctx);

    drawHUD(ctx, score, lives, wave, enemiesRemaining);

    // ================================================================
    // PRETEXT DEMONSTRATION #6: Wave announcement overlay
    // Using Pretext to center and size wave announcements perfectly
    // ================================================================
    if (gameTime < 120 && gameTime % 5 < 3) {
      const announceText = `第 ${wave} 波来袭!`;
      const announceFont = 'bold 36px "Segoe UI", sans-serif';
      const prepared = prepare(announceText, announceFont);
      const { width, height } = layout(prepared, Infinity, 44);

      ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
      const boxW = width + 40;
      const boxH = 50;
      ctx.fillRect(W / 2 - boxW / 2, H / 2 - boxH / 2, boxW, boxH);

      ctx.font = announceFont;
      ctx.fillStyle = '#ef4444';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(announceText, W / 2, H / 2);
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
    }

    requestAnimationFrame(gameLoop);
  }

  // Initialize
  showOverlay('menu');
  gameLoop();
  </script>
</body>
</html>

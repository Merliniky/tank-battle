<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a12">
  <title>坦克大战</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a12;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    #gameContainer {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    canvas {
      display: block;
      border-radius: 8px;
      box-shadow: 0 0 60px rgba(0, 200, 100, 0.15);
    }
    #overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(10, 10, 18, 0.95);
      color: #fff;
      text-align: center;
      padding: 20px;
      border-radius: 8px;
      z-index: 10;
    }
    #overlay.hidden { display: none; }
    #overlay h1 {
      font-size: clamp(36px, 10vw, 56px);
      color: #4ade80;
      text-shadow: 0 0 30px rgba(74, 222, 128, 0.6);
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    #overlay .subtitle {
      font-size: clamp(14px, 4vw, 18px);
      color: #888;
      margin-bottom: 24px;
    }
    #overlay .instructions {
      font-size: clamp(12px, 3.5vw, 15px);
      color: #666;
      line-height: 2.2;
      margin-bottom: 28px;
    }
    #overlay .key {
      display: inline-block;
      background: #222;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 4px 10px;
      font-family: ui-monospace, monospace;
      color: #aaa;
      font-size: clamp(11px, 3vw, 14px);
    }
    #overlay .btn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border: none;
      color: white;
      font-size: clamp(16px, 5vw, 22px);
      padding: clamp(12px, 3vw, 18px) clamp(36px, 10vw, 60px);
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 6px 30px rgba(34, 197, 94, 0.5);
      min-width: 180px;
    }
    #overlay .btn:active {
      transform: scale(0.96);
    }
    #overlay .score-display {
      font-size: clamp(24px, 7vw, 32px);
      color: #fbbf24;
      margin-bottom: 16px;
      font-weight: bold;
    }
    #overlay .game-over-title {
      font-size: clamp(36px, 10vw, 52px);
      color: #ef4444;
      text-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
      margin-bottom: 12px;
    }
    #overlay .stats {
      font-size: clamp(13px, 3.5vw, 17px);
      color: #aaa;
      margin-bottom: 28px;
      line-height: 2;
    }
    /* Mobile controls - hidden on desktop */
    #mobileControls {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 200px;
      pointer-events: none;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .mobile-controls-active #mobileControls {
      display: block;
    }
    #joystickArea {
      position: absolute;
      left: 20px;
      bottom: 20px;
      width: 140px;
      height: 140px;
      pointer-events: auto;
    }
    #joystickBase {
      position: absolute;
      width: 120px;
      height: 120px;
      background: rgba(255, 255, 255, 0.1);
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      left: 10px;
      top: 10px;
    }
    #joystickKnob {
      position: absolute;
      width: 50px;
      height: 50px;
      background: rgba(74, 222, 128, 0.7);
      border: 2px solid #4ade80;
      border-radius: 50%;
      left: 45px;
      top: 45px;
      transition: none;
    }
    #fireBtn {
      position: absolute;
      right: 30px;
      bottom: 50px;
      width: 90px;
      height: 90px;
      background: rgba(239, 68, 68, 0.6);
      border: 3px solid rgba(239, 68, 68, 0.8);
      border-radius: 50%;
      pointer-events: auto;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      color: white;
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
      user-select: none;
      -webkit-user-select: none;
    }
    #fireBtn:active, #fireBtn.active {
      background: rgba(239, 68, 68, 0.9);
      transform: scale(0.92);
    }
    .powered-by {
      position: absolute;
      bottom: 6px;
      right: 12px;
      font-size: 10px;
      color: #333;
    }
    /* Desktop hover hint */
    #hoverHint {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #555;
      display: none;
    }
    @media (hover: hover) and (pointer: fine) {
      #hoverHint { display: block; }
    }
    .is-mobile #hoverHint { display: none !important; }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="game"></canvas>
    <div id="overlay">
      <h1>🎮 坦克大战</h1>
      <p class="subtitle">Battle City · HTML5</p>
      <div class="instructions" id="instructions">
        <!-- JS will fill this -->
      </div>
      <button class="btn" id="startBtn">开始游戏</button>
      <p style="margin-top:20px;font-size:12px;color:#444;">文字渲染 by @chenglou/pretext</p>
    </div>
  </div>

  <div id="mobileControls">
    <div id="joystickArea">
      <div id="joystickBase"></div>
      <div id="joystickKnob"></div>
    </div>
    <div id="fireBtn">🔥</div>
  </div>
  <div id="hoverHint">WASD / 方向键移动 · 空格射击</div>

  <script src="https://cdn.jsdelivr.net/npm/@chenglou/pretext@0.0.3/dist/layout.js"></script>
  <script>
  // ================================================================
  // 坦克大战 - Tank Battle Game
  // Mobile-first, iPhone 14 Pro Max optimized
  // Uses @chenglou/pretext for text measurement
  // ================================================================

  const { prepare, prepareWithSegments, layout, layoutWithLines } = window.Pretext;

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  // instructions reference removed - not needed
  const mobileControls = document.getElementById('mobileControls');
  const joystickArea = document.getElementById('joystickArea');
  const joystickKnob = document.getElementById('joystickKnob');
  const fireBtn = document.getElementById('fireBtn');
  const gameContainer = document.getElementById('gameContainer');

  // Detect mobile
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || 
                   ('ontouchstart' in window && navigator.maxTouchPoints > 0);
  if (isMobile) {
    document.body.classList.add('is-mobile');
    document.body.classList.add('mobile-controls-active');
  }

  // ================================================================
  // RESPONSIVE CANVAS SIZING
  // iPhone 14 Pro Max: 430 x 932 logical pixels, 3x DPR
  // Fit game into screen with proper aspect ratio
  // ================================================================
  const GAME_W = 400;
  const GAME_H = 560;
  const TILE = 32;
  const COLS = Math.floor(GAME_W / TILE); // 12.5 → 12
  const ROWS = Math.floor((GAME_H - 60) / TILE); // rows for map

  function resizeCanvas() {
    const maxW = window.innerWidth - 16;
    const maxH = window.innerHeight - (isMobile ? 220 : 60); // leave room for controls on mobile

    const scale = Math.min(maxW / GAME_W, maxH / GAME_H);
    const w = Math.floor(GAME_W * scale);
    const h = Math.floor(GAME_H * scale);

    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    canvas.width = GAME_W;
    canvas.height = GAME_H;
  }

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ================================================================
  // PRETEXT HELPER: Measure text with Pretext for precise layout
  // ================================================================
  function measureText(text, fontSize, bold = false) {
    const font = `${bold ? 'bold ' : ''}${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
    const prepared = prepare(text, font);
    return layout(prepared, Infinity, fontSize * 1.3);
  }

  function drawText(text, x, y, fontSize, color, align = 'left') {
    const { width } = measureText(text, fontSize);
    ctx.font = `${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
    ctx.fillStyle = color;
    ctx.textBaseline = 'top';
    let drawX = x;
    if (align === 'center') drawX = x - width / 2;
    else if (align === 'right') drawX = x - width;
    ctx.fillText(text, drawX, y);
    return width;
  }

  function drawBoldText(text, x, y, fontSize, color, align = 'left') {
    const { width } = measureText(text, fontSize, true);
    ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
    ctx.fillStyle = color;
    ctx.textBaseline = 'top';
    let drawX = x;
    if (align === 'center') drawX = x - width / 2;
    else if (align === 'right') drawX = x - width;
    ctx.fillText(text, drawX, y);
    return width;
  }

  // Game state
  let gameState = 'menu';
  let score = 0;
  let lives = 3;
  let wave = 1;
  let enemiesLeft = 0;
  let gameTime = 0;

  // Colors
  const COL = {
    player: '#22c55e',
    playerDark: '#16a34a',
    enemy: '#ef4444',
    enemyDark: '#dc2626',
    bullet: '#fbbf24',
    wall: '#6b7280',
    brick: '#d97706',
    water: '#1e40af',
    waterLight: '#3b82f6',
    grass: '#1a2e1a',
    explosion: ['#fbbf24', '#f97316', '#ef4444', '#dc2626'],
  };

  // Audio
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function playSound(type) {
    if (!audioCtx) return;
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      const now = audioCtx.currentTime;
      if (type === 'shoot') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(220, now);
        osc.frequency.exponentialRampToValueAtTime(60, now + 0.08);
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
        osc.start(now); osc.stop(now + 0.08);
      } else if (type === 'explosion') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(120, now);
        osc.frequency.exponentialRampToValueAtTime(25, now + 0.25);
        gain.gain.setValueAtTime(0.18, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
        osc.start(now); osc.stop(now + 0.25);
      } else if (type === 'hit') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(700, now);
        osc.frequency.exponentialRampToValueAtTime(180, now + 0.12);
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
        osc.start(now); osc.stop(now + 0.12);
      }
    } catch(e) {}
  }

  // Tank class
  class Tank {
    constructor(x, y, isPlayer = false) {
      this.x = x; this.y = y;
      this.isPlayer = isPlayer;
      this.size = 28;
      this.dir = isPlayer ? 0 : 2;
      this.speed = isPlayer ? 2.8 : (1.4 + Math.random() * 0.6);
      this.fireRate = isPlayer ? 180 : 1200 + Math.random() * 800;
      this.lastFire = 0;
      this.color = isPlayer ? COL.player : COL.enemy;
      this.invincible = 0;
      this.health = isPlayer ? 3 : 1;
    }
    update(map) {
      if (this.invincible > 0) this.invincible--;
      const nx = this.x + this.getDX();
      const ny = this.y + this.getDY();
      if (this.canMove(nx, ny, map)) {
        this.x = nx; this.y = ny;
      }
      this.x = Math.max(TILE, Math.min(GAME_W - TILE - this.size, this.x));
      this.y = Math.max(TILE + 40, Math.min(GAME_H - this.size, this.y));
    }
    getDX() { return [0, this.speed, 0, -this.speed][this.dir]; }
    getDY() { return [-this.speed, 0, this.speed, 0][this.dir]; }
    canMove(x, y, map) {
      const corners = [[x+4,y+4],[x+this.size-4,y+4],[x+4,y+this.size-4],[x+this.size-4,y+this.size-4]];
      for (const [cx,cy] of corners) {
        const tx = Math.floor(cx / TILE);
        const ty = Math.floor(cy / TILE);
        if (ty < 0 || ty >= map.length || tx < 0 || tx >= map[0].length) return false;
        const t = map[ty][tx];
        if (t === 1 || t === 2) return false;
      }
      return true;
    }
    draw(ctx) {
      if (this.invincible > 0 && Math.floor(this.invincible/4)%2) return;
      ctx.save();
      ctx.translate(this.x + this.size/2, this.y + this.size/2);
      ctx.rotate((this.dir * Math.PI) / 2);
      ctx.fillStyle = this.color;
      ctx.fillRect(-12, -12, 24, 24);
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.fillRect(-8, -8, 16, 16);
      ctx.fillStyle = this.isPlayer ? COL.playerDark : COL.enemyDark;
      ctx.fillRect(-3, -12, 6, 18);
      ctx.fillRect(-2.5, -17, 5, 6);
      ctx.restore();
    }
    getCenter() { return { x: this.x + this.size/2, y: this.y + this.size/2 }; }
  }

  // Bullet class
  class Bullet {
    constructor(x, y, dir, isPlayer = true) {
      this.x = x; this.y = y; this.dir = dir; this.isPlayer = isPlayer;
      this.speed = 7; this.active = true;
    }
    update() {
      const dx = [0, this.speed, 0, -this.speed][this.dir];
      const dy = [-this.speed, 0, this.speed, 0][this.dir];
      this.x += dx; this.y += dy;
      if (this.x < 0 || this.x > GAME_W || this.y < 0 || this.y > GAME_H) this.active = false;
    }
    draw(ctx) {
      ctx.fillStyle = COL.bullet;
      ctx.shadowColor = COL.bullet;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(this.x, this.y, 3, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  // Explosion class
  class Explosion {
    constructor(x, y) {
      this.x = x; this.y = y; this.frame = 0; this.maxFrames = 18; this.active = true;
    }
    update() { this.frame++; if (this.frame >= this.maxFrames) this.active = false; }
    draw(ctx) {
      const p = this.frame / this.maxFrames;
      const r = 6 + p * 20;
      ctx.globalAlpha = 1 - p;
      ctx.fillStyle = COL.explosion[Math.min(Math.floor(p * 4), 3)];
      ctx.beginPath();
      ctx.arc(this.x, this.y, r, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // ================================================================
  // HUD - All text rendered with Pretext for pixel-perfect layout
  // ================================================================
  function drawHUD(ctx) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, GAME_W, 38);

    const fs = 13;
    const y = 11;

    // Score (right aligned)
    const scoreNum = `${score}`;
    const sW = drawBoldText(scoreNum, GAME_W - 8, y, fs, '#fbbf24', 'right');

    const scoreLbl = '分';
    drawText(scoreLbl, GAME_W - 8 - sW - 4, y, fs, '#666', 'right');

    // Lives as mini tanks (left side)
    drawText('命', 8, y, fs, '#666');
    for (let i = 0; i < lives; i++) {
      ctx.fillStyle = COL.player;
      ctx.fillRect(36 + i * 18, y + 1, 12, 12);
    }

    // Wave (center)
    const waveTxt = `第${wave}波`;
    const { width: waveW } = measureText(waveTxt, fs);
    drawText(waveTxt, GAME_W/2 - waveW/2, y, fs, '#4ade80');

    // Enemy count
    const enemyTxt = `敌:${enemiesLeft}`;
    const { width: eW } = measureText(enemyTxt, fs);
    drawText(enemyTxt, GAME_W/2 - waveW/2 - eW - 10, y, fs, '#ef4444');
  }

  function formatTime(f) {
    const s = Math.floor(f/60);
    return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
  }

  // ================================================================
  // PRETEXT WAVE ANNOUNCEMENT
  // ================================================================
  function drawWaveAnnounce(ctx, waveNum, remaining) {
    if (remaining <= 0 && gameTime < 150 && gameTime > 10) {
      const p = Math.min(1, (150 - gameTime) / 30);
      ctx.globalAlpha = p;
      const txt = `第 ${waveNum} 波`;
      const font = `bold 28px -apple-system, BlinkMacSystemFont, sans-serif`;
      const prepared = prepare(txt, font);
      const { width } = layout(prepared, Infinity, 36);
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(GAME_W/2 - width/2 - 16, GAME_H/2 - 22, width + 32, 44);
      ctx.font = font;
      ctx.fillStyle = '#ef4444';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(txt, GAME_W/2, GAME_H/2);
      ctx.textAlign = 'left';
      ctx.globalAlpha = 1;
    }
  }

  // Map generation
  function generateMap() {
    const rows = Math.floor((GAME_H - 40) / TILE);
    const map = Array(rows).fill(null).map(() => Array(COLS).fill(0));
    const numTiles = COLS * rows;

    // Border
    for (let c = 0; c < COLS; c++) { map[0][c] = 1; map[rows-1][c] = 1; }
    for (let r = 0; r < rows; r++) { map[r][0] = 1; map[r][COLS-1] = 1; }

    // Random obstacles (20% density)
    for (let r = 2; r < rows - 2; r++) {
      for (let c = 2; c < COLS - 2; c++) {
        if (Math.random() < 0.15) {
          map[r][c] = Math.random() > 0.5 ? 1 : 2;
        }
      }
    }
    return map;
  }

  function drawMap(ctx, map) {
    for (let r = 0; r < map.length; r++) {
      for (let c = 0; c < map[r].length; c++) {
        const tx = c * TILE;
        const ty = r * TILE + 38;
        const t = map[r][c];
        if (t === 1) {
          ctx.fillStyle = COL.wall;
          ctx.fillRect(tx, ty, TILE, TILE);
          ctx.fillStyle = '#9ca3af';
          ctx.fillRect(tx+2, ty+2, TILE-4, 4);
          ctx.fillRect(tx+2, ty+2, 4, TILE-4);
        } else if (t === 2) {
          ctx.fillStyle = COL.brick;
          ctx.fillRect(tx, ty, TILE, TILE);
          ctx.strokeStyle = '#78350f';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(tx, ty + TILE/2); ctx.lineTo(tx+TILE, ty+TILE/2);
          ctx.moveTo(tx + TILE/3, ty); ctx.lineTo(tx + TILE/3, ty+TILE);
          ctx.moveTo(tx + TILE*2/3, ty); ctx.lineTo(tx + TILE*2/3, ty+TILE);
          ctx.stroke();
        } else if (t === 3) {
          ctx.fillStyle = COL.water;
          ctx.fillRect(tx, ty, TILE, TILE);
          ctx.fillStyle = COL.waterLight;
          const off = Math.sin(Date.now()/200 + c*3 + r) * 2;
          ctx.fillRect(tx+4+off, ty+6, 8, 4);
          ctx.fillRect(tx+16-off, ty+16, 10, 4);
        } else {
          ctx.fillStyle = COL.grass;
          ctx.fillRect(tx, ty, TILE, TILE);
          ctx.fillStyle = '#2d4a2d';
          ctx.fillRect(tx+6, ty+6, 4, 4);
          ctx.fillRect(tx+20, ty+16, 5, 5);
          ctx.fillRect(tx+10, ty+24, 4, 4);
        }
      }
    }
  }

  // Spawn enemies
  function spawnWave(num) {
    const spawns = [[2,2],[COLS-3,2],[2,4],[COLS-3,4],[Math.floor(COLS/2)-1,2]];
    for (let i = 0; i < num; i++) {
      const [sx, sy] = spawns[i % spawns.length];
      const e = new Tank(sx * TILE, sy * TILE + 38, false);
      e.speed = 1.3 + wave * 0.15 + Math.random() * 0.5;
      enemies.push(e);
    }
    enemiesLeft = num;
  }

  // Game objects
  let map = [], player, enemies = [], bullets = [], explosions = [];
  let keys = {};
  let joystick = { active: false, dx: 0, dy: 0 };
  let firing = false;

  // Input - Keyboard
  document.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === ' ') e.preventDefault();
  });
  document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  // Input - Mobile Joystick
  let joystickOrigin = { x: 0, y: 0 };
  const MAX_DIST = 45;

  joystickArea.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    const rect = joystickArea.getBoundingClientRect();
    joystickOrigin.x = rect.left + rect.width/2;
    joystickOrigin.y = rect.top + rect.height/2;
    joystick.active = true;
  }, { passive: false });

  joystickArea.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!joystick.active) return;
    const t = e.touches[0];
    let dx = t.clientX - joystickOrigin.x;
    let dy = t.clientY - joystickOrigin.y;
    const dist = Math.hypot(dx, dy);
    if (dist > MAX_DIST) { dx = dx/dist*MAX_DIST; dy = dy/dist*MAX_DIST; }
    joystick.dx = dx / MAX_DIST;
    joystick.dy = dy / MAX_DIST;
    joystickKnob.style.left = (45 + dx - 25) + 'px';
    joystickKnob.style.top = (45 + dy - 25) + 'px';
  }, { passive: false });

  const resetJoystick = () => {
    joystick.active = false; joystick.dx = 0; joystick.dy = 0;
    joystickKnob.style.left = '45px'; joystickKnob.style.top = '45px';
  };
  joystickArea.addEventListener('touchend', resetJoystick);
  joystickArea.addEventListener('touchcancel', resetJoystick);

  // Fire button
  fireBtn.addEventListener('touchstart', e => { e.preventDefault(); firing = true; fireBtn.classList.add('active'); }, { passive: false });
  fireBtn.addEventListener('touchend', e => { e.preventDefault(); firing = false; fireBtn.classList.remove('active'); }, { passive: false });

  function handleInput() {
    if (gameState !== 'playing') return;
    let dx = 0, dy = 0;

    if (isMobile && joystick.active) {
      dx = joystick.dx; dy = joystick.dy;
    } else {
      if (keys['w'] || keys['arrowup']) dy = -1;
      if (keys['s'] || keys['arrowdown']) dy = 1;
      if (keys['a'] || keys['arrowleft']) dx = -1;
      if (keys['d'] || keys['arrowright']) dx = 1;
    }

    if (dx !== 0 || dy !== 0) {
      if (Math.abs(dx) > Math.abs(dy)) { player.dir = dx > 0 ? 1 : 3; }
      else { player.dir = dy < 0 ? 0 : 2; }
      player.update(map);
    }

    if (keys[' '] || firing) {
      const now = Date.now();
      if (now - player.lastFire > player.fireRate) {
        player.lastFire = now;
        const c = player.getCenter();
        const bdx = [0, 6, 0, -6][player.dir];
        const bdy = [-6, 0, 6, 0][player.dir];
        bullets.push(new Bullet(c.x + bdx, c.y + bdy, player.dir, true));
        playSound('shoot');
      }
    }
  }

  function updateEnemies() {
    for (const e of enemies) {
      e.update(map);
      const now = Date.now();
      if (now - e.lastFire > e.fireRate) {
        e.lastFire = now;
        const c = e.getCenter();
        const bdx = [0, 6, 0, -6][e.dir];
        const bdy = [-6, 0, 6, 0][e.dir];
        bullets.push(new Bullet(c.x + bdx, c.y + bdy, e.dir, false));
      }
    }
  }

  function updateBullets() {
    for (const b of bullets) {
      if (!b.active) continue;
      b.update();

      const tx = Math.floor(b.x / TILE);
      const ty = Math.floor((b.y - 38) / TILE);
      if (ty >= 0 && ty < map.length && tx >= 0 && tx < COLS) {
        if (map[ty][tx] === 1 || map[ty][tx] === 2) {
          b.active = false;
          explosions.push(new Explosion(b.x, b.y));
          if (Math.random() > 0.6) map[ty][tx] = 0;
          playSound('hit');
          continue;
        }
      }

      if (b.isPlayer) {
        for (let i = enemies.length - 1; i >= 0; i--) {
          const ec = enemies[i].getCenter();
          if (Math.hypot(b.x - ec.x, b.y - ec.y) < 14) {
            b.active = false;
            explosions.push(new Explosion(ec.x, ec.y));
            enemies.splice(i, 1);
            enemiesLeft--;
            score += 100 + wave * 10;
            playSound('explosion');
            break;
          }
        }
      } else {
        const pc = player.getCenter();
        if (Math.hypot(b.x - pc.x, b.y - pc.y) < 14 && player.invincible === 0) {
          b.active = false;
          explosions.push(new Explosion(pc.x, pc.y));
          player.health--;
          player.invincible = 90;
          playSound('hit');
          if (player.health <= 0) {
            lives--;
            if (lives <= 0) { gameState = 'gameover'; showOverlay('gameover'); }
            else { player.health = 3; player.x = GAME_W/2-14; player.y = GAME_H - 50; player.invincible = 120; }
          }
        }
      }
    }
    bullets = bullets.filter(b => b.active);
  }

  function showOverlay(type) {
    overlay.classList.remove('hidden');
    if (type === 'menu') {
      overlay.innerHTML = `
        <h1>🎮 坦克大战</h1>
        <p class="subtitle">Battle City · HTML5</p>
        <div class="instructions">
          <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> / 方向键 移动<br>
          <span class="key">空格</span> / 🔥按钮 射击
        </div>
        <button class="btn" id="startBtn">开始游戏</button>
        <p style="margin-top:20px;font-size:12px;color:#444;">文字渲染 by @chenglou/pretext</p>
      `;
      document.getElementById('startBtn').onclick = startGame;
    } else if (type === 'gameover') {
      overlay.innerHTML = `
        <p class="game-over-title">💥 游戏结束</p>
        <p class="score-display">得分: ${score}</p>
        <div class="stats">
          存活时间: ${formatTime(gameTime)}<br>
          通关波数: ${wave - 1} / ${wave}<br>
          击毁坦克: ${Math.floor(score / (100 + wave * 10))}
        </div>
        <button class="btn" id="restartBtn">再来一局</button>
      `;
      document.getElementById('restartBtn').onclick = startGame;
    }
  }

  function startGame() {
    initAudio();
    gameState = 'playing';
    score = 0; lives = 3; wave = 1; gameTime = 0;
    map = generateMap();
    player = new Tank(GAME_W/2 - 14, GAME_H - 50, true);
    enemies = []; bullets = []; explosions = [];
    overlay.classList.add('hidden');
    spawnWave(3);
  }

  function gameLoop() {
    if (gameState === 'playing') {
      gameTime++;
      handleInput();
      updateEnemies();
      updateBullets();
      for (const e of explosions) e.update();
      explosions = explosions.filter(e => e.active);
      if (enemies.length === 0 && enemiesLeft === 0) {
        wave++;
        score += wave * 200;
        spawnWave(Math.min(2 + wave, 8));
      }
    }

    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    drawMap(ctx, map);

    if (gameState === 'playing') {
      drawHUD(ctx);
      for (const e of explosions) e.draw(ctx);
      for (const b of bullets) b.draw(ctx);
      for (const e of enemies) e.draw(ctx);
      player.draw(ctx);
      drawWaveAnnounce(ctx, wave, enemies.length);
    }

    requestAnimationFrame(gameLoop);
  }

  showOverlay('menu');
  gameLoop();
  </script>
</body>
</html>
